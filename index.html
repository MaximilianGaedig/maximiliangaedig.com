<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono&display=swap"
      rel="stylesheet"
    />
    <style type="text/css">
      html,
      body {
        margin: 0;
        padding: 0;
        background-color: #121212;
      }
      a {
        text-decoration: inherit;
        color: inherit;
      }
      .name {
        color: indianred;
        display: inline-block;
        font-weight: bold;
        margin-inline-start: 0;
        margin-inline-end: 0;
      }
      .text {
        padding: 1rem;
        font-family: "Space Mono", monospace;
        color: #fff;
        font-size: 1.2rem;
      }
      .cursor {
        background-color: #fff;
        color: #fff;
        animation: blink 1s infinite;
        user-select: none;
        display: inline-block;
      }
      @keyframes blink {
        50% {
          opacity: 0;
        }
      }
    </style>

    <title>Maximilian Gaedig</title>
  </head>
  <body>
    <div id="about" class="text">
      Hi, I'm
      <div class="name">Maximilian Gaedig</div>
      , I'm currently a web developer and learning to become a sysadmin and
      network engineer. I have very diverse interests in the world of
      technology. I am familiar with
      <div class="name" style="color: lightskyblue">React</div>
      ,
      <div class="name" style="color: lightsalmon">HTML</div>
      ,
      <div class="name" style="color: lightblue">CSS</div>
      ,
      <div class="name" style="color: lightgoldenrodyellow">JavaScript</div>
      ,
      <div class="name" style="color: blue">Python</div>
      and
      <div class="name" style="color: lightgreen">Bash</div>
      .
      <div class="cursor"> </div>
    </div>
    <script>
      const animation = (id) => {
        element = document.getElementById(id);
        const text = element.innerHTML.replace(
          '<div class="cursor"> </div>',
          ""
        );
        let i = 0;
        function type() {
          if (i >= text.length) return;
          // Combine multiple spaces into one
          if (text.slice(i, i + 1) === " ") {
            while (text[++i] === " ") {
              i++;
            }
            i--;
          }
          // Skip tags
          if (text[i] === "<") {
            while (text[i] !== ">") {
              i++;
            }
          }
          element.innerHTML = text.slice(0, i) + "<div class='cursor'> </div>";
          setTimeout(type, 60);
          i++;
        }
        type();
      };
      animation("about");
    </script>
  </body>
</html>
